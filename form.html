    <script>
        const CONFIG = {
            SHEET_ID: '1gFy0aJy_GhIgxb82kcQ85xEoPpSfvtMxq6GAVziXWKY',
            SHEET_NAME: 'เอกสาร',
            THEMES: ['t-green', 't-amber'],
            DL_ICON: `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>`
        };

        let allData = {};
        document.addEventListener('click', function (e) {
            const row = e.target.closest('tr');
            if (!row) return;

            const link = row.querySelector('.btn:not(.disabled)');
            if (link && e.target.tagName !== 'A') {
                window.open(link.href, '_blank');
            }
        });

        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            try {
                const [data, footerHtml] = await Promise.all([
                    fetchSheetData(),
                    fetch('footer.html').then(r => r.ok ? r.text() : '').catch(() => '')
                ]);

                if (footerHtml) document.getElementById('footer').innerHTML = footerHtml;

                if (data) {
                    allData = data;
                    render(allData);

                    document.getElementById('searchInput').addEventListener('input', (e) => {
                        handleSearch(e.target.value);
                    });
                }
            } catch (err) {
                console.error("Error:", err);
                document.getElementById('container').innerHTML = `<p style="text-align:center; color:red; padding:20px;">ขออภัย ไม่สามารถดึงข้อมูลได้ในขณะนี้</p>`;
            }
        }

        async function fetchSheetData() {
            const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
            const response = await fetch(url);
            const csvText = await response.text();
            const rows = parseCSV(csvText);

            return rows.slice(1).reduce((acc, r) => {
                const category = r[1] || 'อื่น ๆ';
                if (!acc[category]) acc[category] = [];
                acc[category].push({ name: r[2], type: r[3], link: r[4] });
                return acc;
            }, {});
        }

        function handleSearch(query) {
            const filtered = {};
            const searchTerm = query.toLowerCase().trim();

            for (const [category, items] of Object.entries(allData)) {
                const filteredItems = items.filter(item =>
                    item.name.toLowerCase().includes(searchTerm)
                );
                if (filteredItems.length > 0) filtered[category] = filteredItems;
            }
            render(filtered);
            if (Object.keys(filtered).length === 0) {
                document.getElementById('container').innerHTML = `<p style="text-align:center; color:#999; padding:50px;">ไม่พบข้อมูลที่ค้นหา</p>`;
            }
        }

        function render(groups) {
            const container = document.getElementById('container');
            let htmlContent = '';
            let themeIndex = 0;

            for (const [category, items] of Object.entries(groups)) {
                const theme = CONFIG.THEMES[themeIndex % CONFIG.THEMES.length];
                themeIndex++;

                const tableRows = items.map(item => {
                    const isValid = item.link?.startsWith('http');
                    return `
                        <tr>
                            <td class="col-name">${item.name}</td>
                            <td class="col-type">${item.type ? `<span class="badge">${item.type}</span>` : ''}</td>
                            <td class="col-btn">
                                <a href="${isValid ? item.link : '#'}" 
                                   class="btn ${isValid ? '' : 'disabled'}" 
                                   target="_blank" rel="noopener">
                                     ดาวน์โหลด ${CONFIG.DL_ICON}
                                </a>
                            </td>
                        </tr>`;
                }).join('');

                htmlContent += `
                    <div class="section ${theme}">
                        <div class="section-header">
                            <div class="title">${category}</div>
                            <div class="col">ประเภท</div>
                            <div class="col">ดาวน์โหลด</div>
                        </div>
                        <table class="table">${tableRows}</table>
                    </div>`;
            }
            container.innerHTML = htmlContent;
        }

        function parseCSV(text) {
            const rows = [];
            let row = [], field = '', inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (inQuotes) {
                    if (char === '"') {
                        if (text[i + 1] === '"') { field += '"'; i++; }
                        else inQuotes = false;
                    } else field += char;
                } else {
                    if (char === '"') inQuotes = true;
                    else if (char === ',') { row.push(field); field = ''; }
                    else if (char === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
                    else if (char !== '\r') field += char;
                }
            }
            if (field || row.length) { row.push(field); rows.push(row); }
            return rows;
        }
    </script>
