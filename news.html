<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข่าวประกาศ</title>
    <link rel="icon" href="image/logo-โรงพยาบาลปัตตานี.png">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/benner.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628;
            --navy-mid: #102240;
            --navy-light: #1a3460;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-pale: #f5e9c8;
            --cream: #faf8f3;
            --white: #ffffff;
            --gray-100: #f4f4f7;
            --gray-200: #e8e8ed;
            --gray-400: #9898a8;
            --gray-600: #585868;
            --text-dark: #12121e;
            --blue-soft: #e8f0fb;
            --blue-mid: #2563b0;
            --green-soft: #e6f4ee;
            --green-mid: #1a7a4a;
            --amber-soft: #fef3e2;
            --amber-mid: #b45309;
        }

        html {
            scroll-behavior: smooth;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            overflow-x: hidden;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="header-inner">
            <a href="homepage.html" style="text-decoration:none;color:inherit;display:contents;">
                <div class="logo-block">
                    <img src="image/logo-โรงพยาบาลปัตตานี.png" width="50" height="50">
                    <div class="logo-text">
                        <h1>กลุ่มงานทรัพยากรบุคคล</h1>
                        <p>โรงพยาบาลปัตตานี</p>
                    </div>
                </div>
            </a>
            <nav class="main-nav">
                <a href="homepage.html">หน้าแรก</a>
                <a href="hrm.html">โครงสร้างกลุ่มงานทรัพยากรบุคคล</a>
                <a href="personnel.html">ข้อมูลบุคลากร</a>
                <a href="program.html">โปรแกรมวันลา/ใบรับรอง</a>
                <a href="form.html">เอกสารต่าง ๆ</a>
                <a href="news" class="active">ข่าวประกาศ</a>
            </nav>
            <div class="header-status">
                <div class="status-top">เวลาทำการ</div>
                <div class="status-row">
                    <div class="status-dot"></div>
                    <span class="status-label">จันทร์ – ศุกร์ &nbsp; 08:30 – 16:30 น.</span>
                </div>
            </div>
        </div>
    </header>
    <section class="hero">
        <div class="hero-bg"><img src="image/IMG_5405.JPG" alt=""></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="logos">
                <div class="logo-circle"><img src="image/logo-กระทรวงสาธารณสุข.png" alt="กระทรวงสาธารณสุข"></div>
                <div class="logo-sep"></div>
                <div class="logo-circle"><img src="image/logo-โรงพยาบาลปัตตานี.png" alt="โรงพยาบาลปัตตานี"></div>
            </div>
            <div class="eyebrow">
                <span class="ew-line"></span>
                <span class="ew-dot"></span>
                <span class="ew-dot" style="opacity:.35;width:3px;height:3px"></span>
                <span class="ew-dot" style="opacity:.35;width:3px;height:3px"></span>
                <span class="ew-line r"></span>
            </div>
            <div class="hero-text">
                <div class="hero-title-th">ข่าวประกาศ</div>
                <div class="hero-title-en">ANNOUNCEMENT NEWS</div>
            </div>
            <div class="foot-orn">
                <span class="fdash" style="width:36px"></span><span class="fdiamond"></span>
                <span class="fdash" style="width:10px"></span>
                <span class="fdiamond" style="opacity:.25;width:3px;height:3px"></span>
                <span class="fdash" style="width:10px"></span><span class="fdiamond"></span>
                <span class="fdash" style="width:36px"></span>
            </div>
        </div>
    </section>

    <div id="footer"></div>
    <script>
        fetch("css/footer.html")
            .then(r => r.text())
            .then(d => { document.getElementById("footer").innerHTML = d; });
    </script>
</body>

</html>
