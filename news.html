<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข่าวประกาศ</title>
    <link rel="icon" href="image/logo-โรงพยาบาลปัตตานี.png">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/benner.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --cream: #faf8f3;
            --white: #ffffff;
            --gray-200: #e8e8ed;
            --gray-400: #9898a8;
            --gray-600: #585868;
            --text-dark: #12121e;
            --blue-soft: #e8f0fb;
            --blue-mid: #2563b0;
            --green-soft: #e6f4ee;
            --green-mid: #1a7a4a;
            --amber-soft: #fef3e2;
            --amber-mid: #b45309;
        }

        html {
            scroll-behavior: smooth;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Optimized Animation ── */
        .fade-up {
            opacity: 0;
            transform: translateY(15px);
            will-change: transform, opacity;
            animation: fadeUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .d1 {
            animation-delay: 0.1s;
        }

        .d2 {
            animation-delay: 0.15s;
        }

        .d3 {
            animation-delay: 0.2s;
        }

        /* ========================
           NEWS SECTION
        ======================== */
        .news-section {
            padding: 3rem 1rem 4rem;
            min-height: 600px;
            /* ป้องกันหน้าเว็บยุบตัวเวลาเปลี่ยนหมวด */
        }

        .news-wrap {
            max-width: 860px;
            margin: 0 auto;
        }

        .news-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .news-header-bar {
            width: 4px;
            height: 28px;
            background: var(--gold);
            border-radius: 2px;
        }

        .news-header h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--navy);
            letter-spacing: 0.02em;
        }

        /* Filter buttons */
        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 14px;
            font-family: 'Sarabun', sans-serif;
            cursor: pointer;
            border: 1.5px solid var(--gray-200);
            background: transparent;
            color: var(--gray-600);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: var(--navy);
            color: var(--gold);
            border-color: var(--navy);
        }

        .filter-btn:hover:not(.active) {
            border-color: var(--navy);
            color: var(--navy);
        }

        /* News list */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: opacity 0.2s ease;
        }

        .news-card {
            display: flex;
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            will-change: transform;
        }

        .news-card:hover {
            box-shadow: 0 8px 24px rgba(10, 22, 40, 0.08);
            transform: translateY(-3px);
        }

        .news-date-block {
            min-width: 80px;
            background: var(--navy);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .news-date-day {
            font-size: 26px;
            font-weight: 700;
            color: var(--gold-light);
            line-height: 1;
        }

        .news-date-month {
            font-size: 12px;
            color: #8eaad0;
            margin-top: 4px;
        }

        .news-body {
            flex: 1;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
        }

        .tag-pill {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 999px;
        }

        .tag-recruit {
            background: var(--green-soft);
            color: var(--green-mid);
        }

        .tag-train {
            background: var(--amber-soft);
            color: var(--amber-mid);
        }

        .tag-announce {
            background: var(--blue-soft);
            color: var(--blue-mid);
        }

        .news-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--navy);
            line-height: 1.4;
        }

        .news-sub {
            font-size: 13px;
            color: var(--gray-400);
        }

        .news-arrow {
            display: flex;
            align-items: center;
            padding-right: 20px;
            color: var(--gold);
            font-size: 20px;
        }
    </style>
    </head>

    <body>

        <header class="site-header">
            <div class="header-inner">
                <a href="homepage.html" style="text-decoration:none;color:inherit;display:contents;">
                    <div class="logo-block">
                        <img src="image/logo-โรงพยาบาลปัตตานี.png" width="50" height="50">
                        <div class="logo-text">
                            <h1>กลุ่มงานทรัพยากรบุคคล</h1>
                            <p>โรงพยาบาลปัตตานี</p>
                        </div>
                    </div>
                </a>
                <nav class="main-nav">
                    <a href="homepage.html">หน้าแรก</a>

                    <div class="nav-dropdown">
                        <a href="#">
                            โครงสร้าง
                            <span class="chevron"></span>
                        </a>
                        <div class="dropdown-menu">
                            <a href="hospital.html">โครงสร้างโรงพยาบาลปัตตานี</a>
                            <a href="administrator.html">โครงสร้างภารกิจอำนวยการ</a>
                            <a href="hrm.html">โครงสร้างกลุ่มงานทรัพยากรบุคคล</a>
                        </div>
                    </div>

                    <a href="personnel.html">ข้อมูลบุคลากร</a>
                    <a href="form.html">เอกสารต่าง ๆ</a>
                    <a href="news.html" class="active">ข่าวประกาศ</a>
                </nav>
                <div class="header-status">
                    <div class="status-top">เวลาทำการ</div>
                    <div class="status-row">
                        <div class="status-dot"></div>
                        <span class="status-label">จันทร์ – ศุกร์ &nbsp; 08:30 – 16:30 น.</span>
                    </div>
                </div>
            </div>
        </header>

        <section class="hero">
            <div class="hero-bg"><img src="image/benner.JPG" alt=""></div>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <div class="logos">
                    <div class="logo-circle"><img src="image/logo-กระทรวงสาธารณสุข.png" alt="กระทรวงสาธารณสุข"></div>
                    <div class="logo-sep"></div>
                    <div class="logo-circle"><img src="image/logo-โรงพยาบาลปัตตานี.png" alt="โรงพยาบาลปัตตานี"></div>
                </div>
                <div class="eyebrow">
                    <span class="ew-line"></span>
                    <span class="ew-dot"></span>
                    <span class="ew-dot" style="opacity:.35;width:3px;height:3px"></span>
                    <span class="ew-dot" style="opacity:.35;width:3px;height:3px"></span>
                    <span class="ew-line r"></span>
                </div>
                <div class="hero-text">
                    <div class="hero-title-th">ข่าวประกาศ</div>
                    <div class="hero-title-en">NEWS</div>
                </div>
                <div class="foot-orn">
                    <span class="fdash" style="width:36px"></span>
                    <span class="fdiamond"></span>
                    <span class="fdash" style="width:10px"></span>
                    <span class="fdiamond" style="opacity:.25;width:3px;height:3px"></span>
                    <span class="fdash" style="width:10px"></span>
                    <span class="fdiamond"></span>
                    <span class="fdash" style="width:36px"></span>
                </div>
            </div>
        </section>

        <section class="news-section">
            <div class="news-wrap">
                <div class="news-header fade-up d1">
                    <div class="news-header-bar"></div>
                    <h2>ประกาศล่าสุด</h2>
                </div>

                <div class="filter-row fade-up d2">
                    <button class="filter-btn active" onclick="filterNews('all', this)">ทั้งหมด</button>
                    <button class="filter-btn" onclick="filterNews('recruit', this)">ประกาศรับสมัคร</button>
                    <button class="filter-btn" onclick="filterNews('train', this)">อบรม</button>
                    <button class="filter-btn" onclick="filterNews('announce', this)">ประกาศ</button>
                </div>

                <div class="news-list fade-up d3" id="newsList">
                </div>
            </div>
        </section>

        <div id="footer"></div>

        <script>
            const items = [
                { day: '6', month: 'มี.ค. 69', tag: 'recruit', tagLabel: 'ประกาศรับสมัคร', title: 'รับสมัครพนักงานกระทรวงสาธารณสุข', sub: 'กำหนดรับสมัคร 16 – 20 มีนาคม 2569', link: '#' },
                { day: '15', month: 'มี.ค. 68', tag: 'train', tagLabel: 'อบรม', title: 'ประกาศรายชื่อผู้เข้าร่วมอบรมหลักสูตร "การพัฒนาภาวะผู้นำสำหรับผู้บริหารสาธารณสุข"', sub: 'อบรมระหว่างวันที่ 25 – 28 มีนาคม 2568', link: '#' },
                { day: '10', month: 'มี.ค. 68', tag: 'announce', tagLabel: 'ประกาศ', title: 'แนวทางการปฏิบัติงานช่วงเทศกาลสงกรานต์ 2568', sub: 'ประกาศโดย กลุ่มงานทรัพยากรบุคคล', link: '#' },
                { day: '5', month: 'มี.ค. 68', tag: 'recruit', tagLabel: 'ประกาศรับสมัคร', title: 'รับสมัครคัดเลือกบุคลากร ตำแหน่งพยาบาลวิชาชีพ', sub: 'กำหนดรับสมัคร 1 – 10 เมษายน 2568', link: '#' },
                { day: '28', month: 'ก.พ. 68', tag: 'train', tagLabel: 'อบรม', title: 'ประกาศรายชื่อผู้มีสิทธิ์เข้ารับการอบรม ประจำปี 2568', sub: 'อบรมวันที่ 15 มีนาคม 2568', link: '#' }
            ];

            const tagClassMap = {
                recruit: 'tag-recruit',
                train: 'tag-train',
                announce: 'tag-announce'
            };

            function renderNews(filter) {
                const list = document.getElementById('newsList');
                const filtered = filter === 'all' ? items : items.filter(i => i.tag === filter);

                if (filtered.length === 0) {
                    list.innerHTML = `<p style="text-align:center; padding:3rem; color:var(--gray-400);">ไม่มีประกาศในหมวดหมู่นี้</p>`;
                    return;
                }

                list.innerHTML = filtered.map(item => `
                <a class="news-card" href="${item.link}">
                    <div class="news-date-block">
                        <div class="news-date-day">${item.day}</div>
                        <div class="news-date-month">${item.month}</div>
                    </div>
                    <div class="news-body">
                        <div><span class="tag-pill ${tagClassMap[item.tag]}">${item.tagLabel}</span></div>
                        <p class="news-title">${item.title}</p>
                        <p class="news-sub">${item.sub}</p>
                    </div>
                    <div class="news-arrow">›</div>
                </a>
            `).join('');
            }

            function filterNews(type, btn) {
                // UI Feedback
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const list = document.getElementById('newsList');
                list.style.opacity = '0.4'; // จังหวะเริ่มเปลี่ยนให้จางลงนิดหน่อยเพื่อความนุ่มนวล

                setTimeout(() => {
                    renderNews(type);
                    list.style.opacity = '1';
                }, 100);
            }

            // Initial Load
            window.addEventListener('DOMContentLoaded', () => {
                renderNews('all');

                // โหลด Footer
                fetch("css/footer.html")
                    .then(r => r.text())
                    .then(d => { document.getElementById("footer").innerHTML = d; })
                    .catch(err => console.log("Footer error:", err));
            });
        </script>
    </body>

</html>
