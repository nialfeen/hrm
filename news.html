    <div id="footer"></div>

    <script>
        fetch("footer.html")
            .then(r => r.text())
            .then(d => document.getElementById("footer").innerHTML = d);

        let items = [];

        const CONFIG = {
            SHEET_ID: '1gFy0aJy_GhIgxb82kcQ85xEoPpSfvtMxq6GAVziXWKY',
            GID: '1279964010'
        };

        const sheetURL = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&gid=${CONFIG.GID}`;

        function splitDate(dateStr) {
            if (!dateStr) return { day: '-', month: '-' };
            const parts = dateStr.trim().split(' ');
            return {
                day: parts[0],
                month: parts.slice(1).join(' ')
            };
        }

        function parseCSV(text) {
            const rows = [];
            let row = [], field = '', inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (inQuotes) {
                    if (char === '"') {
                        if (text[i + 1] === '"') { field += '"'; i++; }
                        else inQuotes = false;
                    } else field += char;
                } else {
                    if (char === '"') inQuotes = true;
                    else if (char === ',') { row.push(field.trim()); field = ''; }
                    else if (char === '\n') { row.push(field.trim()); rows.push(row); row = []; field = ''; }
                    else if (char !== '\r') field += char;
                }
            }
            if (field || row.length) { row.push(field.trim()); rows.push(row); }
            return rows;
        }

        async function loadSheetData() {
            try {
                const res = await fetch(sheetURL, { cache: 'no-store' });
                const text = await res.text();
                const rows = parseCSV(text);

                items = rows.slice(1)
                    .filter(r => r[3])
                    .map(r => {
                        const d = splitDate(r[1]);
                        return {
                            day: d.day,
                            month: d.month,
                            tag: r[2] || 'ประกาศ',
                            title: r[3] || '',
                            sub: r[4] || '',
                            link: r[5] || '#'
                        };
                    });
                items.reverse();

                renderFilters();
                renderNews('all');

            } catch (e) {
                console.error(e);
                document.getElementById('newsList').innerHTML = 'โหลดข้อมูลไม่สำเร็จ';
            }
        }

        function renderFilters() {
            const row = document.getElementById('filterRow');
            const uniqueTags = [...new Set(items.map(i => i.tag))];

            let html = `<button class="filter-btn active" onclick="filterNews('all', this)">ทั้งหมด</button>`;
            uniqueTags.forEach(tag => {
                html += `<button class="filter-btn" onclick="filterNews('${tag}', this)">${tag}</button>`;
            });
            row.innerHTML = html;
        }

       function renderNews(filter) {
    const list = document.getElementById('newsList');
    const filtered = filter === 'all' ? items : items.filter(i => i.tag === filter);

    list.innerHTML = filtered.map((item, idx) => `
        <a class="news-card" href="${item.link}" target="_blank">
            <div class="news-date-block">
                <div class="news-date-day">${item.day}</div>
                <div class="news-date-month">${item.month}</div>
            </div>
            <div class="news-body">
                <div class="news-tag-row">
                    <span class="tag-pill">${item.tag}</span>
                    ${idx === 0 ? '<span class="new-badge">NEW</span>' : ''}
                </div>
                <p class="news-title">${item.title}</p>
                <p class="news-sub">${item.sub}</p>
            </div>
            <div class="news-arrow">&#x203A;</div>
        </a>
    `).join('');
}

        function filterNews(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderNews(type);
        }

        window.addEventListener('DOMContentLoaded', loadSheetData);
    </script>

</body>
