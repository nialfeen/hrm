        <div class="news-wrap">

            <!-- <h2>ประกาศล่าสุด</h2> -->

    <div id="footer"></div>

    <script>
        fetch("footer.html")
            .then(r => r.text())
            .then(d => document.getElementById("footer").innerHTML = d);

        let items = [];
        const sheetURL =
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vRYICatXDJisNrjsbMVkK6v-Lga_2dP83ZqQirE2P2jfjYfTCOz5MqpO8Opk2KQN_F7hYSXeaR30qaq/pub?gid=1279964010&single=true&output=csv&t=" + new Date().getTime();


        function splitDate(dateStr) {
            if (!dateStr) return { day: '-', month: '-' };
            const parts = dateStr.trim().split(' ');
            return {
                day: parts[0],
                month: parts.slice(1).join(' ')
            };
        }

        function parseCSV(text) {
            const rows = text
                .split(/\r?\n/)
                .filter(r => r.trim() && r.includes(","));

            return rows.slice(1).map(row => {
                const values = [];
                let curr = "";
                let inQuotes = false;

                for (let i = 0; i < row.length; i++) {
                    const c = row[i];

                    if (c === '"') {
                        inQuotes = !inQuotes;
                    } else if (c === ',' && !inQuotes) {
                        values.push(curr.trim());
                        curr = "";
                    } else {
                        curr += c;
                    }
                }
                values.push(curr.trim());

                return {
                    dateStr: values[1] || "",
                    type: values[2] || "",
                    title: values[3] || "",
                    duration: values[4] || "",
                    fileLink: values[5] || ""
                };
            });
        }
        async function loadSheetData() {
            try {
                const res = await fetch(sheetURL, {
                    cache: "no-store"
                });

                const text = await res.text();
                const data = parseCSV(text);

                items = data
                    .filter(r => r.title) // กันแถวว่าง
                    .map(row => {
                        const d = splitDate(row.dateStr);
                        return {
                            day: d.day,
                            month: d.month,
                            tag: row.type || "ประกาศ",
                            title: row.title || "",
                            sub: row.duration || "",
                            link: row.fileLink || "#"
                        };
                    });

                // เรียงใหม่แบบปลอดภัย (ไม่พึ่ง reverse อย่างเดียว)
                items.sort((a, b) => b.day - a.day);

                renderFilters();
                renderNews('all');

            } catch (e) {
                console.error(e);
                document.getElementById('newsList').innerHTML = "โหลดข้อมูลไม่สำเร็จ";
            }
        }

        /* ✅ filter auto จากค่า tag จริง */
        function renderFilters() {
            const row = document.getElementById('filterRow');

            const uniqueTags = [...new Set(items.map(i => i.tag))];

            let html = `<button class="filter-btn active" onclick="filterNews('all', this)">ทั้งหมด</button>`;

            uniqueTags.forEach(tag => {
                html += `
            <button class="filter-btn" onclick="filterNews('${tag}', this)">
                ${tag}
            </button>
        `;
            });

            row.innerHTML = html;
        }

        function renderNews(filter) {
            const list = document.getElementById('newsList');
            const filtered = filter === 'all' ? items : items.filter(i => i.tag === filter);

            list.innerHTML = filtered.map(item => `
        <a class="news-card" href="${item.link}" target="_blank">
            <div class="news-date-block">
                <div class="news-date-day">${item.day}</div>
                <div class="news-date-month">${item.month}</div>
            </div>

            <div class="news-body">
                <span class="tag-pill">${item.tag}</span>
                <p class="news-title">${item.title}</p>
                <p class="news-sub">${item.sub}</p>
            </div>

            <div class="news-arrow">›</div>
        </a>
    `).join('');
        }

        function filterNews(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderNews(type);
        }

        window.addEventListener('DOMContentLoaded', loadSheetData);
    </script>
