    </div>

    <div id="footer"></div>

    <script>

        const params = new URLSearchParams(window.location.search);
        const gidsParam = params.get("gids");
        const singleGid = params.get("gid");

        fetch("footer.html")
            .then(r => r.text())
            .then(d => document.getElementById("footer").innerHTML = d);

        const SHEET_ID = "1EO2QWq6Jd1LDEe1KJawoCeeRoH5kqX0WllneNnbLIyk";

        const SHEETS = [];

        if (gidsParam) {
            gidsParam.split(",").forEach(g => SHEETS.push({ gid: g.trim() }));
        } else if (singleGid) {
            SHEETS.push({ gid: singleGid.trim() });
        }

        function parseCSV(text) {
            const rows = [];
            let row = [], field = "", inQ = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                if (inQ) {
                    if (c === '"' && text[i + 1] === '"') { field += '"'; i++; }
                    else if (c === '"') inQ = false;
                    else field += c;
                } else {
                    if (c === ',') { row.push(field.trim()); field = ""; }
                    else if (c === '\n') { row.push(field.trim()); rows.push(row); row = []; field = ""; }
                    else if (c !== '\r') field += c;
                }
            }
            if (row.length || field) { row.push(field.trim()); rows.push(row); }
            return rows;
        }

        function isNum(v) {
            if (v === "" || v === null) return false;
            const n = v.toString().replace(/,/g, '');
            return !isNaN(n) && !isNaN(parseFloat(n));
        }

        function isEmpty(row) {
            return row.every(c => c === "");
        }

        function classify(row) {
            if (isEmpty(row)) return "spacer";
            const cells = row.filter(c => c !== "");
            const first = cells[0] || "";

            if (first.trim().startsWith("*")) return "note";

            if (cells.some(c => c.includes("ภารกิจ") || c.includes("โรงพยาบาลปัตตานี") || c.includes("สรุปกรอบอัตรากำลัง"))) {
                return "mission";
            }

            // ❌ เอา "ฝ่าย" ออก
            if (/^\d+\./.test(first) || cells.some(c => /กลุ่มงาน/.test(c))) return "subgroup";

            return "data";
        }

        function extract(row) {
            const nonEmpty = row.filter(c => c !== "");

            if (nonEmpty.length === 0) {
                return { label: "", num: "" };
            }

            if (nonEmpty.length === 1) {
                return { label: nonEmpty[0], num: "" }; // 👉 กันเคส cell เดียว
            }

            const value = nonEmpty[nonEmpty.length - 1];
            const label = nonEmpty.slice(0, -1).join(" ");

            return { label, num: value };
        }

        function renderMission(rows, container) {
            let currentGrid = null, currentBlock = null;

            const notes = []; // 👉 เก็บ note ไว้ก่อน

            rows.forEach(row => {
                if (isEmpty(row)) return;

                const type = classify(row);
                const { label, num } = extract(row);

                if (type === "note") {
                    notes.push(label); // 👉 ไม่ render ทันที
                    return;
                }

                if (type === "mission") {
                    const banner = document.createElement("div");
                    banner.className = "gs-mission-banner";
                    banner.innerHTML = `<span class="gs-label">${label}</span>${num ? `<span class="gs-badge">${num}</span>` : ""}`;
                    container.appendChild(banner);

                    currentGrid = document.createElement("div");
                    currentGrid.className = "gs-groups-wrap";
                    container.appendChild(currentGrid);
                    currentBlock = null;

                } else if (type === "subgroup") {

                    if (!currentGrid) {
                        currentGrid = document.createElement("div");
                        currentGrid.className = "gs-groups-wrap";
                        container.appendChild(currentGrid);
                    }

                    currentBlock = document.createElement("div");
                    currentBlock.className = "gs-group";
                    currentBlock.innerHTML = `
                <div class="gs-group-header">
                    <span class="gs-label">${label}</span>
                    ${num ? `<span class="gs-badge">${num}</span>` : ""}
                </div>`;
                    currentGrid.appendChild(currentBlock);

               } else {

    if (!currentBlock) return;

    const rowEl = document.createElement("div");
    rowEl.className = "gs-group-row";
    rowEl.innerHTML = `
        <span class="gs-row-label">${label}</span>
        ${num ? `<span class="gs-row-num">${num}</span>` : ""}
    `;
    currentBlock.appendChild(rowEl);
}
            });

            // 👉 render note “นอกกลุ่ม แต่ยังอยู่ในแผ่นเดียวกัน”
            if (notes.length && currentGrid) {
                const noteBox = document.createElement("div");
                noteBox.className = "gs-note-inline";

                noteBox.innerHTML = notes.map(n => `<div class="note-line">${n}</div>`).join("");

                currentGrid.appendChild(noteBox); // ✅ อยู่ในกรอบเดียวกัน
            }
        }
        async function loadAllSheets() {
            const container = document.getElementById("gs-panels");
            container.innerHTML = `<div class="gs-loading">กำลังโหลดข้อมูล...</div>`;

            container.innerHTML = `<div class="gs-sheet"></div>`;
            const sheetBox = container.querySelector(".gs-sheet");

            for (let i = 0; i < SHEETS.length; i++) {
                const sheet = SHEETS[i];

                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${sheet.gid}`;

                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error("HTTP " + res.status);

                    const csv = await res.text();
                    const rows = parseCSV(csv);

                    renderMission(rows, sheetBox);

                    // ✅ delay กันโดน block
                    await new Promise(r => setTimeout(r, 200));

                } catch (err) {
                    const errEl = document.createElement("div");
                    errEl.className = "gs-error";
                    errEl.textContent = `⚠ โหลดไม่สำเร็จ (gid=${sheet.gid}): ${err.message}`;
                    sheetBox.appendChild(errEl);
                }
            }
        }

        loadAllSheets();
    </script>
